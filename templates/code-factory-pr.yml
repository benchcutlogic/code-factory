name: Code Factory PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  auto_merge:
    name: Auto Merge
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - run: gh pr merge ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --squash --auto --delete-branch
        env:
          GH_TOKEN: ${{ github.token }}
