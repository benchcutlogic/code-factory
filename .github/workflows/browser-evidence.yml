name: Browser Evidence

on:
  workflow_call:
    inputs:
      browser_required:
        required: true
        type: string

jobs:
  browser_evidence:
    name: Browser Evidence
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: benchcutlogic/code-factory
          path: .code-factory-control
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - if: ${{ hashFiles('**/pnpm-lock.yaml') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - if: ${{ hashFiles('**/pnpm-lock.yaml') != '' }}
        uses: pnpm/action-setup@v4
        with:
          version: "9"
      - if: ${{ hashFiles('**/package-lock.json') != '' && hashFiles('**/pnpm-lock.yaml') == '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - if: ${{ hashFiles('**/pnpm-lock.yaml') != '' }}
        run: pnpm install --frozen-lockfile
      - if: ${{ hashFiles('**/package-lock.json') != '' && hashFiles('**/pnpm-lock.yaml') == '' }}
        run: npm ci
      - if: ${{ hashFiles('**/package.json') != '' && hashFiles('**/pnpm-lock.yaml') == '' && hashFiles('**/package-lock.json') == '' }}
        run: npm install
      - env:
          BROWSER_REQUIRED: ${{ inputs.browser_required }}
        run: python .code-factory-control/scripts/browser_evidence.py
