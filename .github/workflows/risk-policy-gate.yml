name: risk-policy-gate

on:
  workflow_call:
    inputs:
      base_sha:
        required: true
        type: string
      head_sha:
        required: true
        type: string
    outputs:
      risk_tier:
        value: ${{ jobs.risk-policy-gate.outputs.risk_tier }}
      required_checks:
        value: ${{ jobs.risk-policy-gate.outputs.required_checks }}
      browser_required:
        value: ${{ jobs.risk-policy-gate.outputs.browser_required }}
      review_required:
        value: ${{ jobs.risk-policy-gate.outputs.review_required }}

jobs:
  risk-policy-gate:
    runs-on: ubuntu-latest
    outputs:
      risk_tier: ${{ steps.preflight.outputs.risk_tier }}
      required_checks: ${{ steps.preflight.outputs.required_checks }}
      browser_required: ${{ steps.preflight.outputs.browser_required }}
      review_required: ${{ steps.preflight.outputs.review_required }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: benchcutlogic/code-factory
          path: .code-factory-control
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - id: preflight
        env:
          BASE_SHA: ${{ inputs.base_sha }}
          HEAD_SHA: ${{ inputs.head_sha }}
          CODE_FACTORY_DIR: ${{ github.workspace }}/.code-factory-control
        run: python .code-factory-control/scripts/risk_policy_gate.py
