name: risk-policy-gate

on:
  workflow_call:
    inputs:
      base_sha:
        required: true
        type: string
      head_sha:
        required: true
        type: string
    outputs:
      risk_tier:
        value: ${{ jobs.risk_policy_gate.outputs.risk_tier }}
      required_checks:
        value: ${{ jobs.risk_policy_gate.outputs.required_checks }}
      browser_required:
        value: ${{ jobs.risk_policy_gate.outputs.browser_required }}
      review_required:
        value: ${{ jobs.risk_policy_gate.outputs.review_required }}

jobs:
  risk_policy_gate:
    name: risk-policy-gate
    runs-on: ubuntu-latest
    outputs:
      risk_tier: ${{ steps.preflight.outputs.risk_tier }}
      required_checks: ${{ steps.preflight.outputs.required_checks }}
      browser_required: ${{ steps.preflight.outputs.browser_required }}
      review_required: ${{ steps.preflight.outputs.review_required }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: preflight
        uses: benchcutlogic/code-factory/.github/actions/risk-policy@v1.0.0
        with:
          base_sha: ${{ inputs.base_sha }}
          head_sha: ${{ inputs.head_sha }}
