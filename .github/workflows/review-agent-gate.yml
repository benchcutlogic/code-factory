name: Review Agent

on:
  workflow_call:
    inputs:
      review_required:
        required: true
        type: string
      head_sha:
        required: true
        type: string

jobs:
  review_agent:
    name: Review Agent
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: benchcutlogic/code-factory/.github/actions/review-agent@v1.0.1
        with:
          review_required: ${{ inputs.review_required }}
          head_sha: ${{ inputs.head_sha }}
